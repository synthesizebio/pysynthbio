<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>pysynthbio docs have moved</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://docs.synthesize.bio/python-sdk" />
    <script>
      (function () {
        var base = "https://docs.synthesize.bio/python-sdk";
        var pathMap = {
          "installation": "/installation",
          "getting-started": "/getting-started",
          "baseline": "/models/baseline",
          "reference-conditioning": "/models/reference-conditioning",
          "metadata-prediction": "/models/metadata-prediction",
          "license": "/license"
        };
        var path = window.location.pathname.replace(/^\/pysynthbio/, "");
        var match = path.match(/\/usage\/([^/]+?)(?:\.html)?\/?$/);
        var target = base;
        if (match && pathMap[match[1]]) {
          target = base + pathMap[match[1]];
        }
        window.location.replace(target);
      })();
    </script>
    <meta http-equiv="refresh" content="1; url=https://docs.synthesize.bio/python-sdk" />
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; max-width: 36rem; margin: 4rem auto; padding: 0 1rem; color: #0f172a; }
      a { color: #15803d; }
    </style>
  </head>
