name: Deploy Legacy Docs Redirect to GitHub Pages

# The canonical pysynthbio docs now live at https://docs.synthesize.bio/pysynthbio
# (built by the Mintlify aggregator from this repo's docs-external/ directory).
#
# This workflow keeps the legacy GitHub Pages URL working by publishing a tiny
# static site that redirects every legacy Sphinx URL to its new location on
# docs.synthesize.bio. Visitors hitting any old bookmark land on the matching
# page without manual intervention.

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy Redirect Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Build redirect site
        env:
          TARGET: https://docs.synthesize.bio/pysynthbio
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/usage

          # Each legacy Sphinx URL maps to its equivalent on the new docs site.
          # Keep these parallel arrays in sync with docs-external/docs.json.
          PATHS=(
            "index.html"
            "usage/installation.html"
            "usage/getting-started.html"
            "usage/available-metadata.html"
            "usage/baseline.html"
            "usage/reference-conditioning.html"
            "usage/metadata-prediction.html"
            "usage/license.html"
          )
          URLS=(
            "$TARGET/"
            "$TARGET/installation"
            "$TARGET/getting-started"
            "$TARGET/available-metadata"
            "$TARGET/models/baseline"
            "$TARGET/models/reference-conditioning"
            "$TARGET/models/metadata-prediction"
            "$TARGET/license"
          )

          write_redirect() {
            local out="$1"
            local url="$2"
            cat > "site/$out" <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Moved — pysynthbio docs</title>
              <link rel="canonical" href="$url">
              <meta name="robots" content="noindex">
              <meta http-equiv="refresh" content="0; url=$url">
              <script>window.location.replace("$url");</script>
            </head>
            <body>
              <p>The pysynthbio documentation has moved to
                <a href="$url">$url</a>.</p>
            </body>
          </html>
          HTML
          }

          for i in "${!PATHS[@]}"; do
            write_redirect "${PATHS[$i]}" "${URLS[$i]}"
          done

          # Fallback for any unmapped legacy URL: send /usage/<slug>.html to
          # /pysynthbio/<slug> on the new site, otherwise to the docs root.
          cat > site/404.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Moved — pysynthbio docs</title>
              <link rel="canonical" href="$TARGET/">
              <meta name="robots" content="noindex">
              <script>
                (function () {
                  var target = "$TARGET";
                  var path = window.location.pathname || "";
                  var match = path.match(/\/usage\/([^/]+?)\.html$/);
                  var dest = match ? target + "/" + match[1] : target + "/";
                  window.location.replace(dest);
                })();
              </script>
              <meta http-equiv="refresh" content="0; url=$TARGET/">
            </head>
            <body>
              <p>The pysynthbio documentation has moved to
                <a href="$TARGET/">$TARGET/</a>.</p>
            </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
